<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to Netflix Clone - Watch movies and TV shows">
    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Netflix Clone - Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix Logo">
    </nav>

    <div class="signin-container">
        <div class="signin-box">
            <h1>Sign In</h1>

            <input type="email" id="email"
                   value="utkarsh.singh.5499@gmail.com"
                   readonly
                   style="cursor:not-allowed; opacity:0.7;">

            <input type="password" id="password"
                   id="password"
                   style="cursor:not-allowed; opacity:0.7;">

            <button onclick="signIn()">Sign In</button>
            <p class="signin-footer">New to Netflix? <a href="index.html">Sign up now</a></p>
        </div>
    </div>

    <script>
        // Cross-browser fix — password field value set via JS
        window.onload = function() {
            document.getElementById('password').value = '12345678';
            document.getElementById('password').setAttribute('readonly', true);
        }

        function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(email && password) {
                document.cookie = "netlfix_user=" + email + "; path=/; SameSite=Lax";
                window.location.href = 'index.html';
            } else {
                alert('Please enter email and password!');
            }
        }
    </script>
</body>
</html>
